name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      POSTGRES_DSN: postgres://pulse:pulse@localhost:5432/pulse?sslmode=disable
      PULSE_DB_DSN: postgres://pulse:pulse@localhost:5432/pulse?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest
      - name: migrate
        run: goose -dir migrations postgres "$POSTGRES_DSN" up
      - name: unit tests
        run: go test -race -count=1 ./...
      - name: integration tests
        run: go test -race -count=1 -tags=integration ./...

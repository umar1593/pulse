services:
  postgres-primary:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pulse-pg-primary-data:/var/lib/postgresql/data
      - ./deploy/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Added in week 4: streaming replica
  # postgres-replica:
  #   image: postgres:17-alpine
  #   ...

  # Added in week 6: pgbouncer + patroni + etcd

  # Added in week 7: minio for WAL-G backups

  # Added in week 8: prometheus, grafana, postgres_exporter

volumes:
  pulse-pg-primary-data:

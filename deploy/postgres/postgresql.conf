# pulse PostgreSQL configuration
# Each parameter is annotated. These values target a developer laptop running
# the docker-compose stack. In week 8 we'll fork this file with production
# values and document the deltas alongside benchmark numbers.

# --- connections -----------------------------------------------------------
listen_addresses = '*'
max_connections = 200          # app uses pgx pool of 20-50; reserve room for
                               # admin sessions, replication slots, exporters

# --- memory ----------------------------------------------------------------
shared_buffers = 256MB         # ~25% of container RAM in dev; prod: 25-40% RAM
work_mem = 16MB                # per-sort/hash op; query plans use modest sorts
maintenance_work_mem = 128MB   # speeds up CREATE INDEX, VACUUM, ANALYZE
effective_cache_size = 1GB     # planner hint about OS cache; prod: ~75% RAM

# --- WAL / replication -----------------------------------------------------
wal_level = logical            # supports both physical and logical replication
max_wal_senders = 5
max_replication_slots = 5
max_wal_size = 2GB
min_wal_size = 256MB
wal_compression = on

# --- query planning --------------------------------------------------------
random_page_cost = 1.1         # SSD assumption (HDD: 4.0)
effective_io_concurrency = 200 # SSD; HDD: 2

# --- partitioning helpers --------------------------------------------------
enable_partition_pruning = on
enable_partitionwise_join = on
enable_partitionwise_aggregate = on

# --- observability ---------------------------------------------------------
shared_preload_libraries = 'pg_stat_statements,auto_explain'
pg_stat_statements.track = all
pg_stat_statements.max = 10000
auto_explain.log_min_duration = '500ms'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_format = 'json'
auto_explain.log_nested_statements = on

# --- logging ---------------------------------------------------------------
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = '200ms'   # slow query log
log_line_prefix = '%t [%p] %q%u@%d '
log_lock_waits = on
log_temp_files = 0
log_checkpoints = on

# --- autovacuum ------------------------------------------------------------
# events is partitioned and write-heavy; we'll revisit autovacuum settings in
# week 3 once we have measured bloat. Defaults are fine for week 1.
